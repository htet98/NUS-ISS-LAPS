<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: head('Login – LAPS')}"></head>
<body class="bg-light">

<div class="d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow" style="width: 400px;">
        <div class="card-header bg-primary text-white text-center fw-bold fs-5">
            LAPS – Leave Application System
        </div>
        <div class="card-body p-4">

            <!-- Error flash -->
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Username</label>
                    <input type="text" id="username" name="username" class="form-control"
                           placeholder="Enter your username" required autofocus/>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">Password</label>
                    <input type="password" id="password" name="password" class="form-control"
                           placeholder="Enter your password" required/>
                </div>
                <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>

            <hr class="my-3"/>
            <p class="text-muted small text-center mb-0">
                Test accounts — password: <code>password123</code><br/>
                <strong>manager1</strong> (Manager) &nbsp;|&nbsp;
                <strong>alice</strong> / <strong>bob</strong> (Employee)
				<br/>
				<strong>admin</strong> / (Admin)
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
