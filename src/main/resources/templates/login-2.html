<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAPS | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --nus-blue: #483D8B ;  /*#003d7c;*/
            --nus-orange: #ef7c00;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* Aesthetic background gradient */
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
            background-color: #ffffff;
            overflow: hidden;
        }

        .card-header-custom {
            background-color: var(--nus-blue);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .card-body {
            padding: 40px 30px;
        }

        .form-label {
            font-weight: 500;
            color: #4a5568;
            font-size: 0.9rem;
        }

        .form-control {
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #e2e8f0;
        }

        .form-control:focus {
            border-color: var(--nus-blue);
            box-shadow: 0 0 0 3px rgba(0, 61, 124, 0.1);
        }

        .btn-login {
            background-color: var(--nus-blue);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            color: white;
        }

        .btn-login:hover {
            background-color: #002a54;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 61, 124, 0.2);
            color: white;
        }

        /* Styling for the alerts below inputs */
        .alert-custom {
            margin-top: 1.5rem;
            border-radius: 8px;
            font-size: 0.85rem;
            padding: 10px 15px;
            border: none;
        }
    </style>
</head>
<body>

<div class="login-card card">
    <div class="card-header-custom">
        <h2 class="mb-1 fw-bold">LAPS</h2>
        <p class="mb-0 opacity-75">Staff Login Portal</p>
    </div>

    <div class="card-body">
        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-control" 
                       placeholder="Enter your username" required autofocus>
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" 
                       placeholder="Enter your password" required>
            </div>

            <div th:if="${param.error}" class="alert alert-danger alert-custom mb-3">
                <strong>Access Denied:</strong> Invalid username or password.
            </div>

            <div th:if="${param.logout}" class="alert alert-info alert-custom mb-3">
                You have been logged out successfully.
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-login">Sign In</button>
            </div>
        </form>
    </div>
    
    <div class="text-center pb-4">
        <small class="text-muted">NUS-ISS Leave Application Processing System</small>
    </div>
</div>

</body>
</html>
