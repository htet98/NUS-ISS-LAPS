<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: head('Apply for Leave – LAPS')}"></head>
<body>

<!-- ── Header fragment ─────────────────────────────────────────── -->
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-4">
    <h2 class="mb-4">Apply for Leave</h2>

    <!-- Flash / inline error messages -->
    <div th:if="${__${FLASH_ERROR}__}" class="alert alert-danger" th:text="${__${FLASH_ERROR}__}"></div>

    <!-- Leave Balance Summary -->
    <div class="card mb-4">
        <div class="card-header bg-light fw-semibold">Your Current Leave Balances</div>
        <div class="card-body">
            <div class="row g-3">
                <div th:each="balance : ${leaveBalances}" class="col-md-4">
                    <div class="border rounded p-3 text-center">
                        <div class="fw-semibold" th:text="${balance.leaveType.name}">Leave Type</div>
                        <div class="text-muted small">
                            <span th:text="${balance.totalDays - balance.usedDays}">0</span> days remaining
                            (<span th:text="${balance.usedDays}">0</span> used of
                             <span th:text="${balance.totalDays}">0</span>)
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Application Form -->
    <div class="card">
        <div class="card-header bg-primary text-white fw-semibold">New Leave Application</div>
        <div class="card-body">
            <form th:action="@{__${ROUTE_LEAVE_APPLY}__}" th:object="${leaveApplication}" method="post" novalidate>
                <!-- Leave Type -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Leave Type <span class="text-danger">*</span></label>
                    <select th:field="*{leaveType}" class="form-select"
                            th:classappend="${#fields.hasErrors('leaveType')} ? 'is-invalid'">
                        <option value="">-- Select Leave Type --</option>
                        <option th:each="leaveType : ${leaveTypes}"
                                th:value="${leaveType.leaveTypeId}"
                                th:text="${leaveType.name}">Annual Leave</option>
                    </select>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('leaveType')}"
                         th:errors="*{leaveType}"></div>
                </div>

                <!-- Date range -->
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Start Date <span class="text-danger">*</span></label>
                        <input type="date" th:field="*{startDate}" class="form-control"
                               th:classappend="${#fields.hasErrors('startDate')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('startDate')}"
                             th:errors="*{startDate}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">End Date <span class="text-danger">*</span></label>
                        <input type="date" th:field="*{endDate}" class="form-control"
                               th:classappend="${#fields.hasErrors('endDate')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('endDate')}"
                             th:errors="*{endDate}"></div>
                    </div>
                </div>

                <!-- Reason -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Reason <span class="text-danger">*</span></label>
                    <textarea th:field="*{reason}" class="form-control" rows="3"
                              maxlength="1000" placeholder="Briefly describe the reason for your leave."
                              th:classappend="${#fields.hasErrors('reason')} ? 'is-invalid'"></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('reason')}"
                         th:errors="*{reason}"></div>
                </div>

                <!-- Work Dissemination -->
                <div class="mb-3">
                    <label class="form-label fw-semibold">Work Dissemination (optional)</label>
                    <textarea th:field="*{workDissemination}" class="form-control" rows="2"
                              maxlength="1000"
                              placeholder="Who will cover your responsibilities while you are away?"></textarea>
                </div>

                <!-- Overseas -->
                <div class="mb-3">
                    <div class="form-check form-switch">
                        <input type="checkbox" th:field="*{isOverseas}" class="form-check-input"
                               id="isOverseasCheck" onchange="toggleContactDetails()"/>
                        <label class="form-check-label" for="isOverseasCheck">
                            I will be travelling overseas during this leave
                        </label>
                    </div>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('isOverseas')}"
                         th:errors="*{isOverseas}"></div>
                </div>

                <!-- Contact Details (shown when overseas is ticked) -->
                <div class="mb-3" id="contactDetailsSection"
                     th:style="${leaveApplication.isOverseas} ? '' : 'display:none'">
                    <label class="form-label fw-semibold">
                        Contact Details <span class="text-danger">*</span>
                        <small class="text-muted">(required when overseas)</small>
                    </label>
                    <textarea th:field="*{contactDetails}" class="form-control" rows="2"
                              maxlength="500"
                              placeholder="Phone number, hotel address, or any reachable contact while overseas."
                              th:classappend="${#fields.hasErrors('contactDetails')} ? 'is-invalid'"></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('contactDetails')}"
                         th:errors="*{contactDetails}"></div>
                </div>

                <!-- Half-day (Compensation Leave only) -->
                <div class="mb-3" id="halfDaySection" style="display:none">
                    <div class="form-check form-switch">
                        <input type="checkbox" th:field="*{isHalfDay}" class="form-check-input"
                               id="isHalfDayCheck" onchange="toggleHalfDayPeriod()"/>
                        <label class="form-check-label" for="isHalfDayCheck">
                            Take as a half-day
                        </label>
                    </div>
                </div>

                <div class="mb-3" id="halfDayPeriodSection" style="display:none">
                    <label class="form-label fw-semibold">Half-Day Period</label>
                    <select th:field="*{halfDayPeriod}" class="form-select">
                        <option value="">-- Select Period --</option>
                        <option value="MORNING">Morning (AM)</option>
                        <option value="AFTERNOON">Afternoon (PM)</option>
                    </select>
                </div>

                <!-- Action buttons -->
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary">Submit Application</button>
                    <a th:href="@{__${ROUTE_LEAVE_HISTORY}__}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleContactDetails() {
        const cb = document.getElementById('isOverseasCheck');
        document.getElementById('contactDetailsSection').style.display = cb.checked ? '' : 'none';
    }

    function toggleHalfDayPeriod() {
        const cb = document.getElementById('isHalfDayCheck');
        document.getElementById('halfDayPeriodSection').style.display = cb.checked ? '' : 'none';
    }

    // Show half-day section only for Compensation Leave
    document.querySelector('select[name="leaveType.leaveTypeId"]').addEventListener('change', function () {
        const selectedText = this.options[this.selectedIndex].text;
        const halfDaySection = document.getElementById('halfDaySection');
        halfDaySection.style.display = selectedText.toLowerCase().includes('compensation') ? '' : 'none';
        if (!selectedText.toLowerCase().includes('compensation')) {
            document.getElementById('halfDayPeriodSection').style.display = 'none';
        }
    });
</script>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
