	<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
	
	<head th:replace="~{fragments/header :: head('Manage Leave Type – LAPS')}"></head>
    <meta charset="UTF-8" />
    <title th:text="${pageTitle}">Manage Leave Types</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 30px;
        background-color: #f7f9fc;
      }

      .container {
        max-width: 1100px;
        margin: auto;
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      h2 {
        margin-bottom: 20px;
        color: #333;
      }

      .error {
        color: red;
        margin-bottom: 15px;
      }

      form {
        margin-bottom: 30px;
        padding: 20px;
        background: #f1f4f8;
        border-radius: 6px;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-weight: bold;
      }

      input[type="text"],
      input[type="number"],
      select,
      textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #bbb;
        border-radius: 4px;
        box-sizing: border-box;
      }

      textarea {
        resize: vertical;
      }

      .checkbox-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      button {
        background: #007bff;
        color: white;
        padding: 10px 18px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }

      button:hover {
        background: #0056b3;
      }

      .cancel-btn {
        background: #6c757d;
        text-decoration: none;
        color: white;
        padding: 10px 18px;
        border-radius: 4px;
        margin-left: 10px;
      }

      .cancel-btn:hover {
        background: #545b62;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 10px;
      }

      table,
      th,
      td {
        border: 1px solid #ddd;
      }

      th,
      td {
        padding: 12px;
        text-align: left;
      }

      th {
        background: #007bff;
        color: white;
      }

      tr:nth-child(even) {
        background: #f9f9f9;
      }

      .action-links a {
        margin-right: 10px;
        text-decoration: none;
        color: #007bff;
        font-weight: bold;
      }

      .action-links a.delete {
        color: red;
      }
    </style>
  </head>
  <body>
	<div th:replace="~{fragments/layout :: navbar}"></div>
    <div class="container">
      <h2>Manage Leave Types</h2>

      <div
        th:if="${errorMessage}"
        class="error"
        th:text="${errorMessage}"
      ></div>

      <form
        th:action="@{/leave-types/save}"
        th:object="${leaveType}"
        method="post"
      >
        <input type="hidden" th:field="*{leaveTypeId}" />

        <div class="form-group">
          <label for="name">Leave Type Name</label>
          <select id="name" th:field="*{name}" required>
            <option value="">-- Select Leave Type --</option>
            <option
              th:each="type : ${nameTypes}"
              th:value="${type}"
              th:text="${type}"
            ></option>
          </select>
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea
            id="description"
            th:field="*{description}"
            rows="3"
          ></textarea>
        </div>

        <div class="form-group">
          <label for="defaultDays">Default Days</label>
          <input
            type="number"
            id="defaultDays"
            th:field="*{defaultDays}"
            min="0"
            required
          />
        </div>

        <div class="form-group checkbox-group">
          <input type="checkbox" id="isPaid" th:field="*{paid}" />
          <label for="isPaid">Paid Leave</label>
        </div>

        <button
          type="submit"
          th:text="${leaveType.leaveTypeId} != null ? 'Update Leave Type' : 'Add Leave Type'"
        >
          Save
        </button>

        <a th:href="@{/leave-types}" class="cancel-btn">Clear</a>
      </form>

      <h2>Leave Type List</h2>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Description</th>
            <th>Default Days</th>
            <th>Paid</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="lt : ${leaveTypes}">
            <td th:text="${lt.leaveTypeId}"></td>
            <td th:text="${lt.name}"></td>
            <td th:text="${lt.description}"></td>
            <td th:text="${lt.defaultDays}"></td>
            <td th:text="${lt.paid ? 'Yes' : 'No'}"></td>
            <td class="action-links">
              <a th:href="@{'/leave-types/edit/' + ${lt.leaveTypeId}}">Edit</a>
              <a
                th:href="@{'/leave-types/delete/' + ${lt.leaveTypeId}}"
                class="delete"
                onclick="
                  return confirm(
                    'Are you sure you want to delete this leave type?',
                  );
                "
              >
                Delete
              </a>
            </td>
          </tr>
          <tr th:if="${#lists.isEmpty(leaveTypes)}">
            <td colspan="6">No leave types found.</td>
          </tr>
        </tbody>
      </table>
    </div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<footer th:replace="~{fragments/footer :: footer}"></footer>
  </body>
</html>
