<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Team Leave History – LAPS Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Team Leave History</h2>
        <a th:href="@{/leave/manager/pending}" class="btn btn-warning btn-sm">
            View Pending Approvals
        </a>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${#lists.isEmpty(applications)}" class="text-center text-muted py-5">
        <p class="fs-5">No leave applications found for your team.</p>
    </div>

    <div th:unless="${#lists.isEmpty(applications)}" class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Employee</th>
                        <th>Leave Type</th>
                        <th>Start Date</th>
                        <th>End Date</th>
                        <th>Duration</th>
                        <th>Status</th>
                        <th>Actioned By</th>
                        <th>Detail</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="app : ${applications}">
                        <td>
                            <div class="fw-semibold"
                                 th:text="${app.employee.first_name + ' ' + app.employee.last_name}">Name</div>
                            <div class="text-muted small" th:text="${app.employee.designation}">Role</div>
                        </td>
                        <td th:text="${app.leaveType.name}">Annual Leave</td>
                        <td th:text="${#temporals.format(app.startDate, 'dd MMM yyyy')}">–</td>
                        <td th:text="${#temporals.format(app.endDate, 'dd MMM yyyy')}">–</td>
                        <td th:text="${app.getDurationDisplay()}">–</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${app.status.name() == 'APPROVED'} ? 'bg-success'
                                               : (${app.status.name() == 'REJECTED'} ? 'bg-danger'
                                               : (${app.status.name() == 'CANCELLED'} ? 'bg-secondary'
                                               : 'bg-warning text-dark'))"
                                  th:text="${app.status.name()}">STATUS</span>
                        </td>
                        <td th:text="${app.approvedBy != null}
                                     ? (app.approvedBy.first_name + ' ' + app.approvedBy.last_name)
                                     : '–'">–</td>
                        <td>
                            <a th:href="@{/leave/{id}(id=${app.leaveApplicationId})}"
                               class="btn btn-sm btn-outline-primary">View</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
