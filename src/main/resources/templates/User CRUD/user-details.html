<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Details</title>
</head>
<body>

<h2>User Details</h2>

<p><strong>User ID:</strong> <span th:text="${user.userId}"></span></p>
<p><strong>Username:</strong> <span th:text="${user.username}"></span></p>
<p><strong>Password:</strong> ********</p>
<p><strong>Role:</strong> <span th:text="${user.role}"></span></p>

<br/>

<!-- DELETE BUTTON -->
<form th:action="@{/users/delete/{id}(id=${user.userId})}" method="post">
    <button type="submit" onclick="return confirm('Are you sure to delete this user?')">
        Delete User
    </button>
</form>

<br/>

<!-- UPDATE BUTTON -->
<a th:href="@{/users/edit/{id}(id=${user.userId})}">
    <button>Update User</button>
</a>

</body>
</html>
