spring.application.name=NUS_ISS_LAPS

spring.datasource.url=jdbc:mysql://localhost:3306/laps?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=create-drop

# Suppress harmless "table doesn't exist" WARNs during the DROP phase on a fresh DB
spring.jpa.properties.hibernate.hbm2ddl.halt_on_error=false

#H2 schema.sql (DDL) data.sql (DML)
#MySQL: data.sql runs after Hibernate creates tables (must be 'always')
spring.sql.init.mode=always
# Forces Hibernate DDL to run before data.sql so tables exist when seed data runs
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
#This property is to print the SQL commans in console 
#Needed Model Mapping + JPA
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Application base URL (used in email notification links)
# Override in production via env var: APP_BASE_URL=https://your-domain.com
app.base-url=http://localhost:8080

# before running the application, make sure run maildev server
# For development, you can use MailDev ( npm install -g maildev ) to capture outgoing emails without sending real ones.
# Email notifications are sent when a manager approves or rejects leave.
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USER:anything}
spring.mail.password=${MAIL_PASS:anything}
spring.mail.from=${MAIL_FROM:noreply@laps.com}
# MailDev: both false. Real SMTP (Gmail/NUS): set MAIL_AUTH=true MAIL_TLS=true
spring.mail.properties.mail.smtp.auth=${MAIL_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_TLS:false}

# Session timeout: set to 30 minutes
server.servlet.session.timeout=30m
server.port=8080

# Active log file
logging.file.name=logs/laps.log