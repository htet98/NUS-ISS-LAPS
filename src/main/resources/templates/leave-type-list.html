<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Leave Type List - LAPS')}"></head>
<body>


<div th:replace="~{fragments/layout :: navbar}"></div>


<div class="container mt-5 mb-5">


   <div class="d-flex justify-content-between align-items-center mb-4">
       <h2>Leave Type List</h2>
       <a th:href="@{/admin/leave-type/create}" class="btn btn-primary shadow-sm">
           + Add Leave Type
       </a>
   </div>


   <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
       <span th:text="${successMessage}"></span>
       <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
   </div>
   <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
       <span th:text="${errorMessage}"></span>
       <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
   </div>


   <div class="card shadow-sm" th:if="${not #lists.isEmpty(leaveTypesList)}">
       <div class="card-body p-0">
           <table class="table table-striped table-hover mb-0">
               <thead class="table-dark">
               <tr>
                   <th><span th:text="#{fieldLabel.leaveTypeId}">ID</span></th>
                   <th><span th:text="#{fieldLabel.name}">Name</span></th>
                   <th><span th:text="#{fieldLabel.description}">Description</span></th>
                   <th><span th:text="#{fieldLabel.defaultDays}">Default Days</span></th>
                   <th><span th:text="#{fieldLabel.isPaid}">Is Paid</span></th>
                   <th class="text-center">Actions</th> </tr>
               </thead>
               <tbody>
               <tr th:each="leaveType : ${leaveTypesList}">
                   <td class="align-middle" th:text="${leaveType.leaveTypeId}"></td>
                   <td class="align-middle fw-bold" th:text="${leaveType.name}"></td>
                   <td class="align-middle" th:text="${leaveType.description}"></td>
                   <td class="align-middle" th:text="${leaveType.defaultDays}"></td>
                   <td class="align-middle">
                       <span th:if="${leaveType.isPaid}" class="badge bg-success">Paid</span>
                       <span th:unless="${leaveType.isPaid}" class="badge bg-secondary">Unpaid</span>
                   </td>
                   <td class="text-center align-middle">
                       <a th:href="@{/admin/leave-type/edit/{id}(id=${leaveType.leaveTypeId})}"
                          class="btn btn-sm btn-outline-primary me-2">
                           Update
                       </a>


                       <a th:href="@{/admin/leave-type/delete/{id}(id=${leaveType.leaveTypeId})}"
                          class="btn btn-sm btn-outline-danger"
                          onclick="return confirm('Are you sure you want to delete this leave type? This action cannot be undone.');">
                           Delete
                       </a>


                   </td>
               </tr>
               </tbody>
           </table>
       </div>
   </div>


   <div th:if="${#lists.isEmpty(leaveTypesList)}" class="alert alert-warning text-center mt-4 shadow-sm">
       <h5 class="alert-heading">No Leave Types Found</h5>
       <p class="mb-0">Your database is currently empty. Click the <strong>Add Leave Type</strong> button above to create one.</p>
   </div>


</div>


<footer th:replace="~{fragments/footer :: footer}"></footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
