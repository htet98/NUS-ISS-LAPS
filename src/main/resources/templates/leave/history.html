<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: head('My Leave History – LAPS')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>My Leave History</h2>
        <a th:href="@{__${ROUTE_LEAVE_APPLY}__}" class="btn btn-primary">+ Apply for Leave</a>
    </div>

    <!-- Flash messages -->
    <div th:if="${__${FLASH_SUCCESS}__}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${__${FLASH_SUCCESS}__}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${__${FLASH_ERROR}__}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${__${FLASH_ERROR}__}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Leave Balance Summary -->
    <div class="row g-3 mb-4">
        <div th:each="balance : ${leaveBalances}" class="col-md-4">
            <div class="card text-center border-0 shadow-sm">
                <div class="card-body py-3">
                    <div class="fw-semibold text-secondary small" th:text="${balance.leaveType.name}">Leave Type</div>
                    <div class="fs-4 fw-bold text-primary"
                         th:text="${#numbers.formatDecimal(balance.totalDays - balance.usedDays, 1, 'POINT', 1, 'COMMA')}"></div>
                    <div class="text-muted small">days remaining</div>
                    <div class="progress mt-2" style="height:6px;">
                        <div class="progress-bar"
                             th:style="'width:' + ${balance.totalDays > 0 ? (balance.usedDays / balance.totalDays * 100) : 0} + '%'"></div>
                    </div>
                    <div class="text-muted small mt-1">
                        <span th:text="${#numbers.formatDecimal(balance.usedDays, 1, 'POINT', 1, 'COMMA')}"></span> used /
                        <span th:text="${#numbers.formatDecimal(balance.totalDays, 1, 'POINT', 1, 'COMMA')}"></span> total
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Filter bar -->
    <form th:action="@{__${ROUTE_LEAVE_HISTORY}__}" method="get" class="row g-2 mb-3 align-items-end">
        <div class="col-md-4">
            <label class="form-label small fw-semibold">Filter by Status</label>
            <select name="status" class="form-select form-select-sm">
                <option value="">All Statuses</option>
                <option th:each="leaveStatus : ${leaveStatuses}"
                        th:value="${leaveStatus.name()}"
                        th:text="${leaveStatus.name()}"
                        th:selected="${leaveStatus.name() == selectedStatus}">STATUS</option>
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label small fw-semibold">Filter by Leave Type</label>
            <select name="leaveTypeId" class="form-select form-select-sm">
                <option value="">All Types</option>
                <option th:each="leaveType : ${leaveTypes}"
                        th:value="${leaveType.leaveTypeId}"
                        th:text="${leaveType.name}"
                        th:selected="${leaveType.leaveTypeId == selectedLeaveTypeId}">Type</option>
            </select>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-outline-primary btn-sm w-100">Apply Filter</button>
        </div>
        <div class="col-md-2">
            <a th:href="@{__${ROUTE_LEAVE_HISTORY}__}" class="btn btn-outline-secondary btn-sm w-100">Reset</a>
        </div>
    </form>

    <!-- Applications table -->
    <div class="card">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(applications)}" class="text-center text-muted py-5">
                No leave applications found for the selected filter.
            </div>
            <div th:unless="${#lists.isEmpty(applications)}" class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Leave Type</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Duration</th>
                            <th>Status</th>
                            <th>Submitted</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="app, iterStat : ${applications}">
                            <td th:text="${(currentPage * size) + iterStat.index + 1}"></td>
                            <td th:text="${app.leaveType}"></td>
                            <td th:text="${#temporals.format(app.startDate, DATE_DISPLAY_FORMAT)}"></td>
                            <td th:text="${#temporals.format(app.endDate, DATE_DISPLAY_FORMAT)}"></td>
                            <td th:text="${app.durationDisplay}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${app.status == STATUS_APPROVED} ? 'bg-success'
                                                   : (${app.status == STATUS_APPLIED} ? 'bg-primary'
                                                   : (${app.status == STATUS_UPDATED} ? 'bg-info text-dark'
                                                   : (${app.status == STATUS_REJECTED} ? 'bg-danger'
                                                   : (${app.status == STATUS_CANCELLED} ? 'bg-secondary'
                                                   : (${app.status == STATUS_DELETED} ? 'bg-dark'
                                                   : 'bg-light text-dark')))))"
                                      th:text="${app.status}"></span>
                            </td>
                            <td th:text="${#temporals.format(app.createdWhen, DATE_DISPLAY_FORMAT)}"></td>
                            <td>
                                <a th:href="@{__${ROUTE_LEAVE_BASE}__/{id}(id=${app.leaveApplicationId})}"
                                   class="btn btn-sm btn-outline-primary me-1">View</a>
                                <a th:if="${app.editable}"
                                   th:href="@{__${ROUTE_LEAVE_BASE}__/{id}/edit(id=${app.leaveApplicationId})}"
                                   class="btn btn-sm btn-outline-warning me-1">Edit</a>
                                <form th:if="${app.deletable}"
                                      th:action="@{__${ROUTE_LEAVE_BASE}__/{id}/delete(id=${app.leaveApplicationId})}"
                                      method="post" class="d-inline"
                                      onsubmit="return confirm('Delete this application?')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger me-1">Delete</button>
                                </form>
                                <form th:if="${app.cancellable}"
                                      th:action="@{__${ROUTE_LEAVE_BASE}__/{id}/cancel(id=${app.leaveApplicationId})}"
                                      method="post" class="d-inline"
                                      onsubmit="return confirm('Cancel this approved leave?')">
                                    <button type="submit" class="btn btn-sm btn-outline-secondary">Cancel Leave</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <div th:replace="~{fragments/layout :: pagination(${ROUTE_LEAVE_HISTORY}, ${currentPage}, ${totalPages}, ${totalItems})}"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
