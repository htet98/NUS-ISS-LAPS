<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Manage Leave Type – LAPS')}"></head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mt-4">

    <h2 class="mb-4">Manage Leave Types</h2>

    <!-- Success Message -->
    <div th:if="${successMessage}" class="alert alert-success">
        <span th:text="${successMessage}"></span>
    </div>

    <!-- Error Message -->
    <div th:if="${errorMessage}" class="alert alert-danger">
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Form Card -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">

            <form th:action="@{/admin/leavetype/save}" th:object="${leaveType}" method="post">
                <input type="hidden" th:field="*{leaveTypeId}" />

                <div class="row g-3">

                    <div class="col-md-6">
                        <label for="name" class="form-label">Leave Type Name</label>
                        <select id="name" class="form-select" th:field="*{name}" required>
                            <option value="">-- Select Leave Type --</option>
                            <option th:each="type : ${nameTypes}"
                                    th:value="${type}"
                                    th:text="${type}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label for="defaultDays" class="form-label">Default Days</label>
                        <input type="number"
                               id="defaultDays"
                               class="form-control"
                               th:field="*{defaultDays}"
                               min="0"
                               required />
                    </div>

                    <div class="col-12">
                        <label for="description" class="form-label">Description</label>
                        <textarea id="description"
                                  class="form-control"
                                  th:field="*{description}"
                                  rows="3"></textarea>
                    </div>

                    <div class="col-12">
                        <div class="form-check">
                            <input type="checkbox"
                                   id="isPaid"
                                   class="form-check-input"
                                   th:field="*{paid}" />
                            <label for="isPaid" class="form-check-label">Paid Leave</label>
                        </div>
                    </div>

                    <div class="col-12">
                        <button type="submit"
                                class="btn btn-primary"
                                th:text="${leaveType.leaveTypeId} != null ? 'Update Leave Type' : 'Add Leave Type'}">
                            Save
                        </button>

                        <a th:href="@{/admin/leavetype}" class="btn btn-outline-secondary ms-2">
                            Clear
                        </a>
                    </div>

                </div>
            </form>

        </div>
    </div>

    <!-- Leave Type List -->
    <div class="card shadow-sm">
        <div class="card-body">
            <h4 class="mb-3">Leave Type List</h4>

            <div th:if="${not #lists.isEmpty(leaveTypes)}">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Default Days</th>
                        <th>Paid</th>
                        <th style="width: 180px;">Action</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:each="lt : ${leaveTypes}">
                        <td th:text="${lt.leaveTypeId}"></td>
                        <td th:text="${lt.name}"></td>
                        <td th:text="${lt.description}"></td>
                        <td th:text="${lt.defaultDays}"></td>
                        <td th:text="${lt.paid ? 'Yes' : 'No'}"></td>
                        <td>
                            <a class="btn btn-outline-primary btn-sm"
                               th:href="@{/admin/leavetype/edit/{id}(id=${lt.leaveTypeId})}">
                                Edit
                            </a>

                            <a class="btn btn-outline-danger btn-sm ms-2"
                               th:href="@{/admin/leavetype/delete/{id}(id=${lt.leaveTypeId})}"
                               onclick="return confirm('Are you sure you want to delete this leave type?');">
                                Delete
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(leaveTypes)}" class="alert alert-info mb-0">
                No leave types found.
            </div>
        </div>
    </div>

</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
