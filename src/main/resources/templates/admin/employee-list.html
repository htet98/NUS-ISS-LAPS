<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee Management – LAPS</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>

<body>
<!-- Navbar -->
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mt-4">

    <h2 class="mb-4">Manage Employees</h2>

    <!-- Success Message -->
    <div th:if="${successMessage}" class="alert alert-success">
        <span th:text="${successMessage}"></span>
    </div>

    <!-- Error Message -->
    <div th:if="${errorMessage}" class="alert alert-danger">
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Add Employee Button -->
    <div class="mb-3">
        <a class="btn btn-primary" th:href="@{${ROUTE_ADMIN_EMPLOYEE_NEW}}">
            Add Employee
        </a>
    </div>

    <!-- Employee Table -->
    <div th:if="${not #lists.isEmpty(employeeList)}" class="card shadow-sm">
        <div class="card-body">

            <table class="table table-bordered table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Employee Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Department</th>
                    <th>Designation</th>
                    <th>Hire Date</th>
                    <th>Status</th>
                    <th style="width: 180px;">Action</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="employee : ${employeeList}">
                    <td th:text="${employee.emp_id}"></td>
                    <td th:text="${employee.first_name + ' ' + employee.last_name}"></td>
                    <td th:text="${employee.email}"></td>
                    <td th:text="${employee.phoneNumber}"></td>
                    <td th:text="${employee.department}"></td>
                    <td th:text="${employee.designation}"></td>
                    <td th:text="${employee.hire_date}"></td>
                    <td th:text="${employee.employeeStatus}"></td>

                    <td>
                        <a class="btn btn-outline-primary btn-sm"
                           th:href="@{/admin/employee/edit/{id}(id=${employee.emp_id})}">
                            Edit
                        </a>

                        <a class="btn btn-outline-danger btn-sm ms-2"
                           th:href="@{/admin/employee/delete/{id}(id=${employee.emp_id})}"
                           onclick="return confirm('Are you sure you want to delete this employee?');">
                            Delete
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

    <!-- No Data -->
    <div th:if="${#lists.isEmpty(employeeList)}" class="alert alert-info">
        No employee found.
    </div>

</div>

<!-- Footer -->
<footer th:replace="~{fragments/footer :: footer}"></footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
