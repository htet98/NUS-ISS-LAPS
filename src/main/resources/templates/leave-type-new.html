<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">


<head th:replace="~{fragments/header :: head('New Leave Type - LAPS')}"></head>


<body>


<div th:replace="~{fragments/layout :: navbar}"></div>


<div class="container mt-5 mb-5" style="max-width: 600px;">


   <h2 class="mb-4">Create New Leave Type</h2>


   <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
   <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>


   <div class="card shadow-sm">
       <div class="card-body">


           <form action="#" th:action="@{/admin/leave-type/create}" th:object="${leaveType}" method="post">


               <div class="mb-3">
                   <label class="form-label font-weight-bold"><span th:text="#{fieldLabel.name}">Name</span></label>
                   <select class="form-select" th:field="*{name}">
						<option value="#">--Select Leave Type--</option>
                       <option value="ANNUAL">Annual</option>
                       <option value="MEDICAL">Medical</option>
                       <option value="COMPENSATION">Compensation</option>
					   <option value="PERSONAL">Personal</option>
					   <option value="MATERNITY">Maternity</option>
                   </select>
                   <div th:if="${#fields.hasErrors('name')}" class="text-danger mt-1 small" th:errors="*{name}"></div>
               </div>


               <div class="mb-3">
                   <label class="form-label font-weight-bold"><span th:text="#{fieldLabel.description}">Description</span></label>
                   <textarea class="form-control" th:field="*{description}" rows="3" placeholder="Please enter description"></textarea>
                   <div th:if="${#fields.hasErrors('description')}" class="text-danger mt-1 small" th:errors="*{description}"></div>
               </div>


               <div class="mb-3">
                   <label class="form-label font-weight-bold"><span th:text="#{fieldLabel.defaultDays}">Default days</span></label>
                   <input type="number" class="form-control" th:field="*{defaultDays}" id="leaveDays" min="0.5" max="18" step="0.5">
                   <div th:if="${#fields.hasErrors('defaultDays')}" class="text-danger mt-1 small" th:errors="*{defaultDays}"></div>
               </div>


               <div class="mb-4">
                   <label class="form-label font-weight-bold d-block"><span th:text="#{fieldLabel.isPaid}">Is Paid Leave?</span></label>


                   <div class="form-check form-check-inline">
                       <input class="form-check-input" type="radio" th:field="*{isPaid}" value="true" id="paidYes" />
                       <label class="form-check-label" for="paidYes">Paid</label>
                   </div>
                   <div class="form-check form-check-inline">
                       <input class="form-check-input" type="radio" th:field="*{isPaid}" value="false" id="paidNo" />
                       <label class="form-check-label" for="paidNo">Unpaid</label>
                   </div>
                   <div th:if="${#fields.hasErrors('isPaid')}" class="text-danger mt-1 small" th:errors="*{isPaid}"></div>
               </div>


               <div class="d-flex gap-3 mt-4">
                   <a th:href="@{/admin/leave-type/list}" class="btn btn-outline-secondary w-50">Cancel</a>
                   <button type="submit" class="btn btn-primary w-50">Create Leave Type</button>
               </div>


           </form>


       </div>
   </div>
</div>


<footer th:replace="~{fragments/footer :: footer}"></footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
   document.addEventListener("DOMContentLoaded", function() {
       const nameSelect = document.getElementById('leaveName');
       const daysInput = document.getElementById('leaveDays');


       function enforceStepRules() {
           if (nameSelect.value === 'COMPENSATION') {
               daysInput.step = '0.5';
           } else {
               daysInput.step = '1';


               if (daysInput.value % 1 !== 0) {
                   daysInput.value = Math.floor(daysInput.value);
               }
           }
       }


       nameSelect.addEventListener('change', enforceStepRules);
       enforceStepRules();
   });
</script>


</body>
</html>
