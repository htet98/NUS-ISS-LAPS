<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout.html :: html_head}"></head>

<body>
    <div th:replace="~{fragments/layout.html :: menu}"></div>
    <div th:replace="~{fragments/layout.html :: header}"></div> 

    <h3>Employee List</h3>
    <a th:href="@{/admin/employee/create}">Add Employee</a>

    <div th:if="${not #lists.isEmpty(employeeList)}">
        <table style="border: 1;">
            <tr class="listHeading">
                <th>Employee Id</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Email</th>
                <th>Phone Number</th>
                <th>Department</th>
                <th>Designation</th>
                <th>Hire Date</th>
                <th>Status</th>
                <th>Edit</th>
                <th>Delete</th>
            </tr>

            <tr th:each="employee : ${employeeList}" class="listRecord">
                <td th:text="${employee.emp_id}">Employee Id</td>
                <td th:text="${employee.first_name}">First Name</td>
                <td th:text="${employee.last_name}">Last Name</td>
                <td th:text="${employee.email}">Email</td>
                <td th:text="${employee.phoneNumber}">Phone Number</td>
                <td th:text="${employee.department}">Department</td>
                <td th:text="${employee.designation}">Designation</td>
                <td th:text="${employee.hire_date}">Hire Date</td>
                <td th:text="${employee.employeeStatus}">Status</td>

                <td>
                    <a th:href="@{/admin/employee/edit/{id}(id=${employee.emp_id})}" class="btn btn-default">
                        <span th:text="#{caption.edit}">Edit</span>
                    </a>
                </td>
                <td>
                    <a th:href="@{/admin/employee/delete/{id}(id=${employee.emp_id})}" class="btn btn-default">
                        <span th:text="#{caption.delete}">Delete</span>
                    </a>
                </td>
            </tr>
        </table>
    </div>

    <div th:replace="~{fragments/layout.html :: footer}"></div>
</body>
</html>
