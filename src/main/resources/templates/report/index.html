<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: head('Reports – LAPS')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-4">
    <!-- Breadcrumb -->
    <div th:replace="~{fragments/breadcrumb :: breadcrumbList(${breadcrumbs})}"></div>
    <h2 class="mb-4">Reports</h2>

    <div class="row g-4">

        <!-- Leave Report card -->
        <div class="col-md-8 mx-auto">
            <div class="card h-100 shadow-sm">
                <div class="card-header bg-primary text-white fw-semibold">
                    📅 Leave Report
                </div>
                <div class="card-body">
                    <p class="text-muted small mb-3">
                        View employees on leave during a selected date range. Filter by leave type.
                        Exportable to CSV.
                    </p>

                    <form th:action="@{/report/leave}" method="get">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Start Date <span class="text-danger">*</span></label>
                            <input type="date" name="startDate" class="form-control"
                                   th:value="${defaultStart}" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">End Date <span class="text-danger">*</span></label>
                            <input type="date" name="endDate" class="form-control"
                                   th:value="${defaultEnd}" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Leave Type</label>
                            <select name="leaveTypeId" class="form-select">
                                <option value="">All Leave Types</option>
                                <option th:each="leaveType : ${leaveTypes}"
                                        th:value="${leaveType.leaveTypeId}"
                                        th:text="${leaveType.name}">Leave Type</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Generate Report</button>
                    </form>
                </div>
            </div>
        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
