<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<!--
  Reusable <head> fragment.
  Usage in any page:
      <head th:replace="~{fragments/header :: head('Page Title – LAPS')}"></head>

  Parameters:
    pageTitle – full <title> string, e.g. "Apply for Leave – LAPS"
-->
<head th:fragment="head(pageTitle)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle}">LAPS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>

</head>
</html>
