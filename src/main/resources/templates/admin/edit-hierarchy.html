<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: head('Change Supervisor – LAPS')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h5 class="card-title mb-0">Change Supervisor</h5>
                </div>
                <div class="card-body">
                    <p>
                        Set supervisor for: 
                        <strong th:text="${employee.first_name + ' ' + employee.last_name}">Employee Name</strong>
                    </p>

                    <form th:action="@{/admin/hierarchy/save}" method="post">
                        <input type="hidden" name="employeeId" th:value="${employee.emp_id}" />

                        <div class="mb-3">
                            <label for="supervisorId" class="form-label">Select Supervisor</label>
                            <select id="supervisorId" name="supervisorId" class="form-select">
                                <option value="">(No Supervisor)</option>
                                <option th:each="mgr : ${managers}" 
                                        th:if="${mgr.emp_id != employee.emp_id}"
                                        th:value="${mgr.emp_id}" 
                                        th:text="${mgr.first_name + ' ' + mgr.last_name + ' (' + mgr.designation + ')'}"
                                        th:selected="${employee.supervisor != null and mgr.emp_id == employee.supervisor.emp_id}">
                                    Manager Name
                                </option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/admin/hierarchy}" class="btn btn-outline-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Update Hierarchy</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
