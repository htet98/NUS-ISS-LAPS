spring.application.name=NUS_ISS_LAPS

spring.datasource.url=jdbc:mysql://localhost:3306/laps?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Junior
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=create-drop
#spring.jpa.hibernate.ddl-auto=update

# Suppress harmless "table doesn't exist" WARNs during the DROP phase on a fresh DB
spring.jpa.properties.hibernate.hbm2ddl.halt_on_error=false

#H2 schema.sql (DDL) data.sql (DML)
#MySQL: data.sql runs after Hibernate creates tables (must be 'always')
spring.sql.init.mode=always
# Forces Hibernate DDL to run before data.sql so tables exist when seed data runs
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
#This property is to print the SQL commans in console 
#Needed Model Mapping + JPA
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# Session timeout: set to 30 minutes
server.servlet.session.timeout=30m
server.port=8080