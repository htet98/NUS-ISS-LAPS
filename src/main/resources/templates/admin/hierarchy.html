<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/header :: head('Manage Approval Hierarchy – LAPS')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-4">
    <!-- Breadcrumb -->
    <div th:replace="~{fragments/breadcrumb :: breadcrumbList(${breadcrumbs})}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Manage Approval Hierarchy</h2>
    </div>

    <div th:if="${__${FLASH_SUCCESS}__}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${__${FLASH_SUCCESS}__}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${__${FLASH_ERROR}__}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${__${FLASH_ERROR}__}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Employee Name</th>
                        <th>Department</th>
                        <th>Designation</th>
                        <th>Current Supervisor</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="emp : ${employees}">
                        <td th:text="${emp.emp_id}">1</td>
                        <td th:text="${emp.first_name + ' ' + emp.last_name}">John Doe</td>
                        <td th:text="${emp.department}">Engineering</td>
                        <td th:text="${emp.designation}">Software Engineer</td>
                        <td>
                            <span th:if="${emp.supervisor != null}" th:text="${emp.supervisor.first_name + ' ' + emp.supervisor.last_name}">Jane Manager</span>
                            <span th:if="${emp.supervisor == null}" class="text-muted">None</span>
                        </td>
                        <td>
                            <a th:href="@{/admin/hierarchy/edit/{id}(id=${emp.emp_id})}" 
                               class="btn btn-sm btn-outline-primary">Change Supervisor</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
